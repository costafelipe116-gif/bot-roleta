[phases.setup]
nixPkgs = [
    "python3",
    "python3Packages.pip",
    "chromium",
    "nss",
    "nspr",
    "atk",
    "cups",
    "dbus",
    "libdrm",
    "libatasmart",
    "libxkbcommon",
    "pango",
    "cairo",
    "alsa-lib",
    "expat",
    "glib",
    "nspr",
    "nss"
]

[phases.build]
cmds = [
    "python -m venv .venv",
    ".venv/bin/pip install --upgrade pip",
    ".venv/bin/pip install -r requirements.txt",
    ".venv/bin/playwright install chromium"
]

[start]
cmd = ".venv/bin/python seu_arquivo.py"
